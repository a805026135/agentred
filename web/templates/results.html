<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentRed - 历史报告</title>
    <style>
        :root {
            --bg-primary: #0f0f13;
            --bg-secondary: #1a1a24;
            --bg-card: #1e1e2e;
            --bg-input: #252536;
            --bg-hover: #2a2a40;
            --text-primary: #e4e4f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6a6a80;
            --accent-red: #e74c3c;
            --accent-red-hover: #c0392b;
            --accent-red-glow: rgba(231, 76, 60, 0.3);
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-orange: #e67e22;
            --accent-yellow: #f1c40f;
            --border: #33334a;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo svg { width: 36px; height: 36px; }
        .header-logo h1 { font-size: 22px; font-weight: 700; color: var(--accent-red); }
        .header-logo span { font-size: 13px; color: var(--text-muted); }

        .header-nav { display: flex; gap: 8px; }
        .header-nav a {
            padding: 8px 16px; border-radius: var(--radius); color: var(--text-secondary);
            text-decoration: none; font-size: 14px; transition: var(--transition); border: 1px solid transparent;
        }
        .header-nav a:hover, .header-nav a.active {
            color: var(--text-primary); background: var(--bg-hover); border-color: var(--border);
        }
        .header-nav a.active { color: var(--accent-red); border-color: var(--accent-red); }

        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
        }

        .card-title {
            font-size: 16px; font-weight: 600; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }

        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-muted);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state .text { font-size: 16px; margin-bottom: 8px; }
        .empty-state .hint { font-size: 14px; }

        /* Report List */
        .report-list { display: grid; gap: 12px; }

        .report-item {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; cursor: pointer;
            transition: var(--transition); display: grid;
            grid-template-columns: auto 1fr auto auto auto;
            align-items: center; gap: 16px;
        }

        .report-item:hover { border-color: var(--accent-red); background: var(--bg-hover); }

        .report-score-circle {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; border: 3px solid;
        }

        .report-score-circle.safe { border-color: var(--accent-green); color: var(--accent-green); }
        .report-score-circle.low_risk { border-color: var(--accent-yellow); color: var(--accent-yellow); }
        .report-score-circle.medium_risk { border-color: var(--accent-orange); color: var(--accent-orange); }
        .report-score-circle.high_risk { border-color: var(--accent-red); color: var(--accent-red); }

        .report-info { flex: 1; }
        .report-info .name { font-size: 15px; font-weight: 600; }
        .report-info .meta { font-size: 12px; color: var(--text-muted); }

        .report-risk-badge {
            padding: 4px 12px; border-radius: 16px; font-size: 12px; font-weight: 600;
        }
        .report-risk-badge.safe { background: rgba(46,204,113,0.15); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .report-risk-badge.low_risk { background: rgba(241,196,15,0.15); color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
        .report-risk-badge.medium_risk { background: rgba(230,126,34,0.15); color: var(--accent-orange); border: 1px solid var(--accent-orange); }
        .report-risk-badge.high_risk { background: rgba(231,76,60,0.15); color: var(--accent-red); border: 1px solid var(--accent-red); }

        .report-time { font-size: 13px; color: var(--text-muted); text-align: right; }

        .report-actions { display: flex; gap: 6px; }

        .btn {
            padding: 6px 12px; border-radius: var(--radius); font-size: 12px; font-weight: 500;
            cursor: pointer; transition: var(--transition); border: 1px solid transparent;
            text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
        }
        .btn-primary { background: var(--accent-red); color: white; border-color: var(--accent-red); }
        .btn-primary:hover { background: var(--accent-red-hover); }
        .btn-secondary { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border); }

        /* Report Detail Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 200; justify-content: center;
            align-items: center;
        }
        .modal-overlay.visible { display: flex; }

        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); width: 90%; max-width: 900px;
            max-height: 80vh; overflow-y: auto; padding: 24px;
        }

        .modal-close {
            position: absolute; top: 12px; right: 16px; font-size: 24px;
            color: var(--text-muted); cursor: pointer; background: none; border: none;
        }

        .detail-section { margin-bottom: 16px; }
        .detail-section-title { font-size: 14px; font-weight: 600; color: var(--accent-red); margin-bottom: 8px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .detail-item { padding: 8px 12px; background: var(--bg-input); border-radius: var(--radius); }
        .detail-item .label { font-size: 11px; color: var(--text-muted); }
        .detail-item .value { font-size: 14px; font-weight: 600; }

        @media (max-width: 768px) {
            .report-item { grid-template-columns: auto 1fr; }
            .report-time, .report-actions { display: none; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">
        <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="16" fill="#1a1a24" stroke="#e74c3c" stroke-width="2"/>
            <path d="M18 6 L26 12 L26 24 L18 30 L10 24 L10 12 Z" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
            <circle cx="18" cy="18" r="4" fill="#e74c3c"/>
        </svg>
        <h1>AgentRed</h1>
        <span>AI Agent Security Testing</span>
    </div>
    <div class="header-nav">
        <a href="/">测试</a>
        <a href="/results" class="active">历史报告</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="card-title">📊 历史报告列表 <span id="reportCount" style="color: var(--text-muted); font-size: 13px; margin-left: 8px;"></span></div>
        <div class="report-list" id="reportList">
            <div class="empty-state">
                <div class="icon">📂</div>
                <div class="text">暂无历史报告</div>
                <div class="hint">运行一次测试后，报告将自动出现在这里</div>
            </div>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
    <div class="modal" style="position: relative;">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>
async function loadReports() {
    try {
        const resp = await fetch('/api/reports');
        const data = await resp.json();

        const list = document.getElementById('reportList');
        document.getElementById('reportCount').textContent = `(${data.total})`;

        if (data.reports.length === 0) {
            list.innerHTML = `<div class="empty-state">
                <div class="icon">📂</div>
                <div class="text">暂无历史报告</div>
                <div class="hint">运行一次测试后，报告将自动出现在这里</div>
            </div>`;
            return;
        }

        list.innerHTML = data.reports.map(r => {
            const riskLabels = { safe: '安全', low_risk: '低风险', medium_risk: '中风险', high_risk: '高风险' };
            return `<div class="report-item" onclick="showDetail('${r.filename}')">
                <div class="report-score-circle ${r.risk_level}">${r.overall_score}</div>
                <div class="report-info">
                    <div class="name">${r.agent_name || 'unknown'}</div>
                    <div class="meta">${r.framework || 'unknown'} · ${r.report_id}</div>
                </div>
                <div class="report-risk-badge ${r.risk_level}">${riskLabels[r.risk_level] || r.risk_level}</div>
                <div class="report-time">${formatTime(r.timestamp)}</div>
                <div class="report-actions">
                    <a class="btn btn-primary" href="/api/reports/${r.filename}/html" target="_blank">HTML</a>
                    <a class="btn btn-secondary" href="/api/reports/${r.filename}/download">JSON</a>
                </div>
            </div>`;
        }).join('');
    } catch (e) {
        console.error('Load reports error:', e);
    }
}

async function showDetail(filename) {
    try {
        const resp = await fetch(`/api/reports/${filename}`);
        const report = await resp.json();

        const summary = report.summary || {};
        const agentInfo = report.agent_info || {};

        const modal = document.getElementById('detailModal');
        const content = document.getElementById('modalContent');

        content.innerHTML = `
            <div class="detail-section">
                <div class="detail-section-title">综合评分</div>
                <div class="detail-grid">
                    <div class="detail-item"><div class="label">综合评分</div><div class="value">${summary.overall_score || 0}/100</div></div>
                    <div class="detail-item"><div class="label">风险等级</div><div class="value">${summary.risk_level || '-'}</div></div>
                    <div class="detail-item"><div class="label">静态评分</div><div class="value">${summary.static_score || '-'}</div></div>
                    <div class="detail-item"><div class="label">动态评分</div><div class="value">${summary.dynamic_score || '-'}</div></div>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-section-title">Agent 信息</div>
                <div class="detail-grid">
                    <div class="detail-item"><div class="label">名称</div><div class="value">${agentInfo.name || '-'}</div></div>
                    <div class="detail-item"><div class="label">框架</div><div class="value">${agentInfo.framework || '-'}</div></div>
                    <div class="detail-item"><div class="label">文件数</div><div class="value">${agentInfo.total_files || '-'}</div></div>
                    <div class="detail-item"><div class="label">耗时</div><div class="value">${report.duration_seconds || 0}s</div></div>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-section-title">改进建议 (${(report.recommendations || []).length})</div>
                ${(report.recommendations || []).map(r => `<div class="detail-item" style="margin-bottom: 4px;"><div class="value" style="font-size: 13px;">${escapeHtml(r)}</div></div>`).join('')}
            </div>

            <div class="detail-section">
                <div class="detail-section-title">配置缺失 (${(report.config_issues || []).length})</div>
                ${(report.config_issues || []).map(i => `<div class="detail-item" style="margin-bottom: 4px;"><div class="value" style="font-size: 13px;">[${i.severity}] ${i.field_name}: ${i.description}</div></div>`).join('')}
            </div>

            <div style="text-align: center; margin-top: 16px;">
                <a class="btn btn-primary" href="/api/reports/${filename}/html" target="_blank" style="font-size: 14px; padding: 10px 24px;">📄 查看 HTML 报告</a>
                <a class="btn btn-secondary" href="/api/reports/${filename}/download" style="font-size: 14px; padding: 10px 24px; margin-left: 8px;">📥 下载 JSON</a>
            </div>
        `;

        modal.classList.add('visible');
    } catch (e) {
        console.error('Show detail error:', e);
    }
}

function closeModal() {
    document.getElementById('detailModal').classList.remove('visible');
}

function formatTime(ts) {
    if (!ts) return '-';
    try {
        const d = new Date(ts);
        return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
    } catch { return ts; }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Close modal on click outside
document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// Init
loadReports();
</script>

</body>
</html>
